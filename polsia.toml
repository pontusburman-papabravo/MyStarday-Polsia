# polsia.toml — recurring product work declarations for Min Stjärndag.
#
# Blaxel / Render Cron: set POLSIA_IN_PROCESS_CRONS_ENABLED=false on Blaxel,
# and render a [[crons]] entry that calls the same job.
#
# During the Blaxel shadow phase, the in-process scheduler is guarded by
# POLSIA_IN_PROCESS_CRONS_ENABLED (set true on Render, false on Blaxel).

[[crons]]
name = "push-reminder-scheduler"
schedule = "*/5 * * * *"
command = "node src/lib/push-reminder-scheduler.js"
description = "Send push notifications (schedule_reminder, inactivity_nudge, star_milestone, backfill_reminder) every 5 minutes. See src/lib/push-reminder-scheduler.js."

[[crons]]
name = "midnight-scheduler"
schedule = "0 0 * * *"
command = "node src/lib/midnight-scheduler.js"
description = "Daily: generate daily_log rows, prune notification_log older than 7 days, write analytics_daily_snapshots. See src/lib/midnight-scheduler.js."

[[crons]]
name = "weekly-summary-email"
schedule = "0 21 * * 0"
command = "node src/lib/weekly-summary-scheduler.js"
description = "Send weekly summary emails to opted-in parents every Sunday at 21:00 Europe/Stockholm. See src/lib/weekly-summary-scheduler.js."