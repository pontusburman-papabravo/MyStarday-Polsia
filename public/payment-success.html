<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betalning genomförd – Min Stjärndag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#F5A623',
            'gold-light': '#FFF3D6',
            navy: '#1B2340',
            mint: '#E0F5EC',
            'text-soft': '#5A6178',
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css?v=2.12.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!-- Cookie-banner med GCM v2 + Meta Pixel + granulära val -->
  <script src="/js/cookie-banner.js?v=2.12.0"></script>
</head>
<body class="bg-white font-body text-navy min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md text-center">
    <div class="text-6xl mb-6">🎉</div>
    <h1 class="font-heading text-3xl font-bold text-navy mb-4">Betalning genomförd!</h1>
    <p class="text-text-soft text-lg mb-8">
      Tack för ditt köp. Ditt konto är nu aktiverat. Välkommen till Min Stjärndag!
    </p>
    <a href="/dashboard"
       class="inline-block bg-gold text-white font-heading font-bold px-8 py-3 rounded-xl hover:opacity-90 transition">
      Gå till din sida
    </a>
  </div>

  <script>
    // Fire Meta Pixel Purchase event with verified payment data injected server-side
    (function () {
      var paymentData = __PIXEL_PAYMENT_DATA__;
      if (window.Pixel && paymentData && paymentData.amount) {
        window.Pixel.purchase(paymentData.amount, paymentData.currency || 'SEK');
      }
    })();
  </script>

  <!-- Service Worker Registration (update detection in /js/sw-register.js) -->
  <script src="/js/sw-register.js?v=2.12.0"></script>
</body>
</html>
