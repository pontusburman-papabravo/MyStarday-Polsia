<!-- ── "Magisk natt" background ─────────────────────────────────────────────── -->
<body class="login-magic-bg safe-area-top safe-area-bottom safe-area-left safe-area-right" style="font-family: 'Plus Jakarta Sans', sans-serif;">

  <!-- Stars -->
  <div id="stars-container" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>
  <!-- Clouds -->
  <div id="clouds-container" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>

  <!-- Main content -->
  <div style="position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;">

    <div style="width:100%;max-width:400px;">

      <!-- Logo -->
      <div class="login-magic-logo" style="margin-bottom:32px;">
        <img
          src="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/generated-images/company_87240/6ca97eeb-88f6-46ad-88b1-23ad62b3bcea.jpg"
          alt="Stjärnmascot"
          class="logo-mascot"
        >
        <div>
          <h1>Stjärndag</h1>
          <p>Tillsammans lyser vi</p>
        </div>
      </div>

      <!-- ── ROLE SELECTION (default view) ───────────────────────────────── -->
      <div id="role-selection" style="display:flex;flex-direction:column;align-items:center;gap:0;">

        <div class="role-cards" style="width:100%;">
          <!-- Kid card -->
          <a href="/child-login" id="kid-role-card" class="role-card kid-card" aria-label="Jag är barn">
            <img
              src="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/generated-images/company_87240/e263d5b1-6cfc-4ba1-b50f-01a360484281.jpg"
              alt="Barn"
              class="card-icon"
              style="width:60px;height:60px;"
            >
            <span class="card-label">Jag är barn</span>
            <span class="card-sub">Logga in med<br>ditt namn och PIN</span>
          </a>

          <!-- Parent card -->
          <button id="parent-role-card" class="role-card parent-card" style="background:rgba(251,191,36,0.18);border-color:rgba(251,191,36,0.35);" aria-label="Jag är vuxen">
            <img
              src="https://pub-629428d185ca4960a0a73c850d32294b.r2.dev/generated-images/company_87240/96526ace-9334-45b7-9592-a7cbb6cf0ef4.jpg"
              alt="Familj"
              class="card-icon"
              style="width:60px;height:60px;"
            >
            <span class="card-label">Jag är vuxen</span>
            <span class="card-sub">Föräldrar &amp; pedagoger</span>
          </button>
        </div>

        <!-- Registration link below cards -->
        <div id="registerBanner" class="magic-footer-link" style="margin-top:16px;display:none;">
          Inget konto?
          <a href="/register">Registrera dig här →</a>
        </div>

      </div>
      <!-- end role-selection -->


      <!-- ── PARENT LOGIN (shown when parent card clicked) ─────────────────── -->
      <div id="parent-login-section" style="display:none;flex-direction:column;align-items:center;gap:0;width:100%;">

        <!-- Back button -->
        <button onclick="LoginMagic.backToRoleSelection()" class="magic-back-btn" aria-label="Tillbaka">
          ← Tillbaka
        </button>

        <!-- Apple Sign In — iOS/native only -->
        <div id="appleLoginSection" class="hidden" style="width:100%;margin-bottom:0;">
          <button
            type="button"
            id="appleLoginBtn"
            onclick="handleAppleLogin()"
            class="apple-btn-magic"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            Logga in med Apple
          </button>
          <p class="ios-caption" data-i18n="auth.login.apple_caption">Endast tillgängligt på iOS</p>

          <!-- Apple error -->
          <div id="appleLoginError" class="magic-error-box" style="display:none;margin-top:12px;"></div>

          <!-- Apple linking prompt -->
          <div id="appleLinkingPrompt" class="hidden" style="margin-top:14px;background:rgba(255,255,255,0.1);border:2px solid rgba(251,191,36,0.4);border-radius:14px;padding:16px;text-align:center;backdrop-filter:blur(12px);">
            <p style="color:#fff;font-size:0.9rem;font-weight:600;margin-bottom:6px;">Ett konto med denna e-postadress finns redan.</p>
            <p style="color:rgba(255,255,255,0.65);font-size:0.8rem;margin-bottom:12px;">Vill du länka ditt Apple-konto till det befintliga kontot?</p>
            <div style="display:flex;gap:10px;">
              <button type="button" onclick="handleAppleLink()" class="ghost-btn" style="flex:1;background:linear-gradient(135deg, #fbbf24, #f59e0b);color:#1d1d1f;border:none;">
                Ja, länka
              </button>
              <button type="button" onclick="dismissAppleLinking()" class="ghost-btn" style="flex:1;">
                Avbryt
              </button>
            </div>
          </div>

          <div class="magic-divider" style="margin:18px 0;">
            <span>eller</span>
          </div>
        </div>

        <!-- Email/password form — always shown unless Apple-only on iOS -->
        <form id="loginForm" class="magic-form-fields" style="width:100%;" novalidate>
          <div>
            <label for="email">E-postadress</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="din@epost.se"
              required
              autocomplete="email"
              class="magic-input"
            />
          </div>
          <div>
            <label for="password">Lösenord</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
              class="magic-input"
            />
          </div>

          <!-- Error -->
          <div id="loginError" class="magic-error-box" style="display:none;"></div>

          <button type="submit" id="submitBtn" class="magic-submit-btn touch-btn">
            Logga in
          </button>
        </form>

        <!-- Links below form -->
        <div class="magic-footer-link" style="width:100%;margin-top:0;">
          <a href="/forgot-password" style="color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.8rem;border-bottom:1px solid rgba(255,255,255,0.25);padding-bottom:1px;">
            Glömt lösenordet?
          </a>
        </div>

        <!-- Registration link -->
        <div id="registerLinkSection" class="magic-footer-link" style="display:none;margin-top:4px;">
          Inget konto?
          <a href="/register">Registrera dig</a>
        </div>

      </div>
      <!-- end parent-login-section -->

    </div>
    <!-- end max-width container -->

  </div>
  <!-- end main content -->

  <!-- ── INLINE AUTH SCRIPT (unchanged from previous login.html) ─────────── -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Redirect already-logged-in users — but VALIDATE the token first
      // to avoid redirect loops when the token is stale/expired.
      if (Auth.isLoggedIn()) {
        try {
          const res = await window.apiFetch('/api/auth/me');
          if (res.ok) {
            const user = Auth.getUser();
            if (user && (user.isAdmin || user.is_admin)) {
              window.location.href = '/admin';
            } else {
              window.location.href = '/dashboard';
            }
            return;
          } else {
            Auth.clearAuth();
          }
        } catch {
          Auth.clearAuth();
        }
      }

      // Show registration links if registration is open
      fetch('/api/registration-status')
        .then(r => r.json())
        .then(data => {
          if (data.registration_enabled) {
            const el = document.getElementById('registerLinkSection');
            if (el) el.style.display = '';
            const banner = document.getElementById('registerBanner');
            if (banner) banner.style.display = '';
          }
        })
        .catch(() => {});

      // Show Apple Sign In button on iOS and native only (not on web Android or desktop)
      if (window.Platform && (window.Platform.isIOS() || window.Platform.isNative())) {
        const appleSection = document.getElementById('appleLoginSection');
        if (appleSection) appleSection.classList.remove('hidden');
      }

      const form     = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const email    = document.getElementById('email');
      const password = document.getElementById('password');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!email.value || !password.value) {
          showErrorInline('loginError', 'Vänligen fyll i både e-post och lösenord');
          return;
        }

        hideErrorInline('loginError');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Loggar in…'; }

        try {
          const res = await window.apiFetch('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({
              email: email.value,
              password: password.value,
            }),
          });

          const data = await res.json().catch(() => ({}));

          if (res.ok && data.user) {
            Auth.setAuth(null, data.user, data.csrfToken, data.expiresAt);
            setTimeout(() => Auth.redirectToDashboard(), 300);
          } else if (res.status === 403 && data.code === 'EMAIL_VERIFICATION_REQUIRED') {
            showVerificationRequired(data.email || email.value);
          } else {
            showErrorInline('loginError', data.error || 'Något gick fel. Vänligen försök igen.');
          }
        } catch (error) {
          showErrorInline('loginError', error.message || 'Något gick fel. Vänligen försök igen.');
        } finally {
          if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Logga in'; }
        }
      });
    });

    function showErrorInline(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.style.display = ''; }
    }
    function hideErrorInline(id) {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; }
    }

    /**
     * Show the verification-required blocking state.
     * Replaces the login form with a message + resend button.
     */
    function showVerificationRequired(userEmail) {
      const section = document.getElementById('parent-login-section');
      if (!section) return;
      section.innerHTML = `
        <button onclick="LoginMagic.backToRoleSelection()" class="magic-back-btn">← Tillbaka</button>
        <div style="text-align:center;">
          <div style="font-size:3.5rem;margin-bottom:16px;">📧</div>
          <h2 style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:12px;">
            Verifiera din e-postadress
          </h2>
          <p style="color:rgba(255,255,255,0.65);font-size:0.9rem;margin-bottom:20px;line-height:1.6;">
            Du måste verifiera din e-postadress för att fortsätta använda Min Stjärndag.
            Kolla din inkorg (och skräppostmappen) efter ett mejl från oss.
          </p>
          <div style="background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left;">
            <p style="font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:4px;">E-postadress:</p>
            <p style="font-weight:600;color:#fff;">${userEmail}</p>
          </div>
          <button id="resendVerifyBtn" onclick="resendFromLogin('${userEmail}')"
            class="magic-submit-btn" style="margin-bottom:12px;">
            Skicka ny verifieringslänk
          </button>
          <p id="resendLoginMessage" style="display:none;font-size:0.85rem;margin-bottom:12px;"></p>
          <p style="font-size:0.75rem;color:rgba(255,255,255,0.4);">Kolla även skräppostmappen. Länken är giltig i 24 timmar.</p>
        </div>
      `;
    }

    async function resendFromLogin(email) {
      const btn = document.getElementById('resendVerifyBtn');
      const msgEl = document.getElementById('resendLoginMessage');
      btn.disabled = true;
      btn.textContent = 'Skickar…';

      try {
        const res = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email }),
        });
        const data = await res.json().catch(() => ({}));
        msgEl.style.display = '';
        if (res.status === 429) {
          msgEl.textContent = data.error || 'Du har redan begärt flera länkrar. Försök igen om en timme.';
          msgEl.style.color = '#fca5a5';
        } else {
          msgEl.textContent = '✅ Ny verifieringslänk skickad! Kolla din inkorg och skräppost.';
          msgEl.style.color = '#86efac';
        }
      } catch {
        msgEl.style.display = '';
        msgEl.textContent = 'Något gick fel. Försök igen.';
        msgEl.style.color = '#fca5a5';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Skicka ny verifieringslänk';
      }
    }

    // ─── Apple Sign In handlers ─────────────────────────────────────────────
    let _applePendingEmail = null;
    let _applePendingIdToken = null;

    async function handleAppleLogin() {
      if (!window.Platform) return;
      hideErrorInline('appleLoginError');
      document.getElementById('appleLinkingPrompt').classList.add('hidden');

      // On iOS: only attempt if the native plugin is installed
      if (Platform.isIOS() && !Platform.appleSignIn.isAvailable()) {
        showErrorInline('appleLoginError', 'Apple-inloggning är inte aktiverad. Uppdatera appen till senaste versionen.');
        return;
      }

      const btn = document.getElementById('appleLoginBtn');
      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Apple…';

      try {
        const result = await window.Platform.appleSignIn.signIn();
        if (!result || !result.idToken) return;

        const res = await fetch('/api/auth/apple', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ idToken: result.idToken, name: result.name }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.user) {
          Auth.setAuth(null, data.user, data.csrfToken, data.expiresAt);
          setTimeout(() => Auth.redirectToDashboard(), 300);
        } else if (res.status === 201 && data.user) {
          Auth.setAuth(null, data.user, data.csrfToken, data.expiresAt);
          if (window.Pixel) window.Pixel.lead();
          setTimeout(() => window.location.href = '/onboarding', 300);
        } else if (res.status === 409 && data.error === 'email_conflict') {
          _applePendingEmail = data.email;
          _applePendingIdToken = result.idToken;
          document.getElementById('appleLinkingPrompt').classList.remove('hidden');
        } else {
          showErrorInline('appleLoginError', data.error || 'Något gick fel med Apple-inloggningen.');
        }
      } catch (err) {
        showErrorInline('appleLoginError', err.message || 'Apple Sign In misslyckades.');
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    }

    async function handleAppleLink() {
      if (!_applePendingEmail || !_applePendingIdToken) return;
      const password = prompt('Ange lösenordet för ' + _applePendingEmail + ' för att länka Apple-kontot:');
      if (!password) return;

      const btn = event.target;
      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Länkar…';

      try {
        // 1. Log in with email + password (creates session)
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email: _applePendingEmail, password }),
        });
        const loginData = await loginRes.json().catch(() => ({}));
        if (!loginRes.ok) {
          showErrorInline('appleLoginError', loginData.error || 'Fel lösenord.');
          return;
        }

        // 2. Link Apple ID to the now-authenticated account
        const linkRes = await fetch('/api/auth/apple/link', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': loginData.csrfToken,
          },
          credentials: 'include',
          body: JSON.stringify({ idToken: _applePendingIdToken }),
        });
        const linkData = await linkRes.json().catch(() => ({}));
        if (!linkRes.ok) {
          showErrorInline('appleLoginError', linkData.error || 'Länkning misslyckades.');
          return;
        }

        // Session already created by step 1
        Auth.setAuth(null, loginData.user, loginData.csrfToken, loginData.expiresAt);
        dismissAppleLinking();
        setTimeout(() => Auth.redirectToDashboard(), 300);
      } catch {
        showErrorInline('appleLoginError', 'Länkning misslyckades.');
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    }

    function dismissAppleLinking() {
      document.getElementById('appleLinkingPrompt').classList.add('hidden');
      _applePendingEmail = null;
      _applePendingIdToken = null;
    }
  </script>
