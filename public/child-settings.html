<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnets inställningar – Min Stjärndag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gold: '#F5A623', 'gold-light': '#FFF3D6', navy: '#1B2340', 'navy-soft': '#2A3458',
            sky: '#E8F0FE', lavender: '#EDE7F6', mint: '#E0F5EC', coral: '#FDEAE7', 'text-soft': '#5A6178',
          },
          fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css?v=2.12.0">
  <script src="/js/theme.js?v=2.12.0"></script>
  <script src="/js/auth.js?v=2.13.0"></script>
  <script src="/js/toast.js?v=2.13.0"></script>
  <script src="/js/birthday-picker.js?v=2.12.0"></script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F5A623">
  <style>
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .setting-row:last-child { border-bottom: none; }
    /* View toggle pill */
    .view-toggle {
      display: flex;
      background: #E8F0FE;
      border-radius: 14px;
      padding: 4px;
      gap: 2px;
    }
    .dark .view-toggle { background: #2A3458; }
    .view-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      color: #5A6178;
      background: transparent;
      text-align: center;
      line-height: 1.3;
    }
    .view-btn.active {
      background: white;
      color: #1B2340;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .dark .view-btn { color: rgba(255,255,255,0.5); }
    .dark .view-btn.active { background: #F5A623; color: white; }
    .section-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(27,35,64,0.06);
    }
    .dark .section-card { background: #2A3458; }
    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5A6178;
      margin-bottom: 16px;
    }
    .toggle-track {
      width: 44px; height: 24px; border-radius: 12px; background: #E5E7EB;
      position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-track.on { background: #F5A623; }
    .toggle-thumb {
      width: 20px; height: 20px; background: white; border-radius: 50%;
      position: absolute; top: 2px; left: 2px;
      transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-track.on .toggle-thumb { transform: translateX(20px); }
    .emoji-opt {
      width: 44px; height: 44px; font-size: 1.5rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; border: 2.5px solid transparent;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .emoji-opt.selected { border-color: #F5A623; background: #FFF3D6; }
    .pin-dots {
      display: flex; gap: 10px; justify-content: center; margin: 12px 0;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2.5px solid #C4B5FD;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled { background: #F5A623; border-color: #F5A623; }
    .pin-numpad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px;
    }
    .pin-key {
      height: 56px; border-radius: 14px; border: none;
      background: #E8F0FE; font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 700;
      color: #1B2340; cursor: pointer; transition: background 0.1s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .dark .pin-key { background: #1B2340; color: white; }
    .pin-key:active { transform: scale(0.93); background: #F5A623; color: white; }
    .pin-key.empty { background: transparent; cursor: default; }
    .pin-key.delete { background: #FDEAE7; color: #DC2626; }
    .dark .pin-key.delete { background: rgba(220,38,38,0.15); color: #F87171; }
    .reward-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .reward-row:last-child { border-bottom: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body class="bg-sky font-body text-navy min-h-screen dark:bg-navy dark:text-white">

  <!-- Header -->
  <div class="bg-navy text-white px-4 py-3 sticky top-0 z-20">
    <div class="flex items-center gap-3 max-w-lg mx-auto">
      <a href="/family" class="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-lg hover:bg-navy-soft transition-colors text-xl" title="Tillbaka">‹</a>
      <div class="flex items-center gap-2 flex-1 min-w-0">
        <span class="text-2xl" id="pageEmoji">⭐</span>
        <div>
          <h1 class="text-base font-heading font-bold leading-tight" id="pageTitle">Inställningar</h1>
          <p class="text-xs text-white/60">Barnets inställningar</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="max-w-lg mx-auto px-4 py-5 space-y-0" id="mainContent">
    <!-- Loading state -->
    <div id="loadingState" class="text-center py-16">
      <div class="text-4xl mb-3 animate-pulse">⭐</div>
      <p class="text-text-soft text-sm">Laddar inställningar…</p>
    </div>
  </div>

  <script src="/js/child-settings.js?v=2.14.0"></script>

  <!-- Service Worker Registration (update detection in /js/sw-register.js) -->
  <script src="/js/sw-register.js?v=2.12.0"></script>
</body>
</html>
