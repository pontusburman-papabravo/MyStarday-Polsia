<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Välkommen till My Starday!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#F5A623', 'gold-light': '#FFF3D6', navy: '#1B2340',
            mint: '#E0F5EC', 'text-soft': '#5A6178',
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'], body: ['Plus Jakarta Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css?v=2.12.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F5A623">
  <style>body { background: linear-gradient(135deg, #FFF8F0 0%, #F0FFF4 100%); }</style>
</head>
<body class="font-body text-navy min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="w-full px-4 py-4 flex items-center justify-between max-w-5xl mx-auto">
    <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
      <div class="w-9 h-9 bg-gold rounded-full flex items-center justify-center shadow">
        <span class="text-lg">⭐</span>
      </div>
      <span class="font-heading font-bold text-navy text-xl">Min Stjärndag</span>
    </a>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-lg text-center">

      <!-- Icon + heading -->
      <div class="mb-6">
        <div class="w-24 h-24 bg-gradient-to-br from-amber-100 to-green-100 rounded-3xl flex items-center justify-center mx-auto shadow-lg">
          <span class="text-5xl">🎉</span>
        </div>
      </div>

      <h1 class="text-3xl font-heading font-bold text-navy mb-4">
        Tack! Din prenumeration är aktiv
      </h1>
      <p class="text-text-soft text-lg mb-3 leading-relaxed">
        Välkommen till My Starday! Nu har du tillgång till alla funktioner för hela din familj.
      </p>
      <p class="text-text-soft text-sm mb-10">
        Du debiteras 59 kr/månad. Avsluta när som helst via Inställningar &gt; Prenumeration.
      </p>

      <a href="/dashboard"
         class="inline-block w-full bg-gold hover:bg-yellow-600 text-white font-heading font-bold text-lg py-4 px-8 rounded-xl transition-all shadow-lg shadow-amber-200 hover:shadow-xl active:scale-[0.98]">
        Gå till din översikt
      </a>

      <p class="text-text-soft text-sm mt-8">
        Frågor? Skriv till <a href="mailto:info@mystarday.se" class="text-navy font-medium underline hover:no-underline">info@mystarday.se</a>
      </p>

    </div>
  </main>

</body>
</html>
