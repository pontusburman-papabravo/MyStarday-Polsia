name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ESLint (devDependency)
        run: npm install --no-save eslint@^9.0.0

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          DATABASE_URL: REDACTED/mock_test
          REQUIRE_EMAIL_VERIFICATION: 'false'
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
